<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sample Designs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

/* ANIMATED BACKGROUND (same as index) */

body{
font-family:'Poppins',sans-serif;
color:white;
padding:80px 20px;

background: linear-gradient(-45deg,#0f0f1a,#1b1b3a,#2b1f4a,#111130);
background-size:400% 400%;
animation:gradientShift 18s ease infinite;
}

@keyframes gradientShift{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* SLIDE UP ANIMATION */

@keyframes slideUp{
0%{
opacity:0;
transform:translateY(40px);
}

100%{
opacity:1;
transform:translateY(0);
}
}

/* NAVIGATION */

nav#top-nav{
position:fixed;
top:20px;
right:20px;
display:flex;
gap:10px;
z-index:999;
}

nav#top-nav a{
color:white;
font-size:1.2rem;
text-decoration:none;
background:#2c2c50;
padding:10px 16px;
border-radius:8px;
transition:.3s;
}

nav#top-nav a:hover{
background:#4a4a80;
}

/* TITLE */

h3{
text-align:center;
margin-bottom:40px;
font-size:2rem;
letter-spacing:2px;

opacity:0;
animation:slideUp 1s ease forwards;
}

/* MASONRY PORTFOLIO LAYOUT */

.gallery{
column-count:3;
column-gap:25px;
max-width:1200px;
margin:auto;
}

/* SAMPLE CARD */

.sample{
break-inside:avoid;
margin-bottom:25px;
background:#1a1a2e;
padding:10px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,.6);
transition:.3s;

opacity:0;
animation:slideUp 1s ease forwards;
}

/* STAGGERED ANIMATION */

.sample:nth-child(1){animation-delay:.2s;}
.sample:nth-child(2){animation-delay:.4s;}
.sample:nth-child(3){animation-delay:.6s;}
.sample:nth-child(4){animation-delay:.8s;}
.sample:nth-child(5){animation-delay:1s;}
.sample:nth-child(6){animation-delay:1.2s;}
.sample:nth-child(7){animation-delay:1.4s;}
.sample:nth-child(8){animation-delay:1.6s;}
.sample:nth-child(9){animation-delay:1.8s;}
.sample:nth-child(10){animation-delay:2s;}

.sample:hover{
transform:translateY(-6px);
box-shadow:0 15px 40px rgba(0,0,0,.8);
}

/* IMAGE */

.sample img{
width:100%;
height:auto;
display:block;
border-radius:6px;
transition:transform .4s ease;
}

.sample:hover img{
transform:scale(1.03);
}

/* TABLET */

@media(max-width:1000px){

.gallery{
column-count:2;
}

}

/* MOBILE */

@media(max-width:600px){

.gallery{
column-count:1;
}

h3{
font-size:1.6rem;
}

}

</style>
</head>

<body>

<nav id="top-nav">
<a href="index.html">← Back</a>
</nav>
