<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>P101</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

/* SMOOTH COLOR CHANGING BACKGROUND */

body{
font-family:'Poppins',sans-serif;
color:white;

background: linear-gradient(-45deg,#0f0f1a,#1b1b3a,#2b1f4a,#111130);
background-size:400% 400%;
animation:gradientShift 18s ease infinite;
}

/* BACKGROUND ANIMATION */

@keyframes gradientShift{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

/* HEADER */

.top{
height:90px;
background:rgba(21,21,40,0.8);
border-bottom:2px solid rgba(255,255,255,0.1);
backdrop-filter:blur(8px);
}

.top-inner{
display:flex;
justify-content:center;
align-items:center;
height:100%;
gap:12px;
}

/* LOGO TEXT */

.logo-text{
font-size:2rem;
letter-spacing:6px;
font-weight:600;
}

/* SPINNING PIXEL */

.pixel{
font-size:1.8rem;
display:inline-block;
animation:spin 6s linear infinite;
}

@keyframes spin{

0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}

}

/* MAIN LAYOUT */

.main-container{
display:flex;
gap:40px;
padding:40px;
min-height:calc(100vh - 90px);
}

/* SIDEBAR */

.sidebar{
width:200px;
}

.sidebar aside{
display:flex;
flex-direction:column;
gap:35px;
margin-top:30px;
}

.sidebar a{
font-size:1.1rem;
color:#d6d6ff;
text-decoration:none;
padding:8px 10px;
border-radius:6px;
transition:.25s;
}

.sidebar a:hover{
background:#2c2c50;
color:white;
}

/* IMAGE AREA */

.image-container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.centered-image{
width:100%;
max-width:850px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* MOBILE DESIGN */

@media (max-width:768px){

.main-container{
flex-direction:column;
align-items:center;
padding:20px;
}

.sidebar{
width:100%;
}

.sidebar aside{
flex-direction:row;
justify-content:center;
gap:20px;
margin-top:10px;
flex-wrap:wrap;
}

.centered-image{
max-width:95%;
}

.logo-text{
font-size:1.5rem;
letter-spacing:4px;
}

.pixel{
font-size:1.5rem;
}

}

</style>
</head>

<body>

<header class="top">

<div class="top-inner">

<span class="logo-text">P</span>
<span class="pixel">🧊</span>
<span class="logo-text">XEL</span>

</div>

</header>

<div class="main-container">

<nav class="sidebar">

<aside>

<a href="index.html">Home</a>
<a href="design.html">Samples</a>
<a href="index2.html">Education</a>
<a href="about.html">About</a>

</aside>

</nav>

<div class="image-container">

<img
class="centered-image"
src="https://i.postimg.cc/8zjZjBDS/Untitled.png"
alt="image">

</div>

</div>

</body>
</html>
